<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fixed Font Awesome -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          integrity="sha512-..." 
          crossorigin="anonymous" 
          referrerpolicy="no-referrer" />

</head>

<body>

<div class="container">    
    <h2>Currency Converter</h2>

    <form>

        <!-- Amount Section -->
        <div class="amount">
            <p>Enter amount:</p>
            <input type="text" id="amount" value="100">
        </div>

        <!-- Currency Selection -->
        <div class="dropdown">

            <!-- From -->
            <div class="from">
                <p>From</p>
                <div class="select-container">
                    <img src="https://flagsapi.com/US/flat/64.png" alt="">
                    <select name="from">
                    
                    </select>
                </div>
            </div>

            <!-- Swap Icon -->
            <div class="icon">
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
            </div>

            <!-- To -->
            <div class="to">
                <p>To</p>
                <div class="select-container">
                    <img src="https://flagsapi.com/NP/flat/64.png" alt="">
                    <select name="to">
        
                    </select>
                </div>
            </div>

        </div>

        <!-- Message -->
        <div class="message">1 USD = 100 NPR</div>

        <!-- Button -->
        <button type="submit">Get Exchange Rate</button>

    </form>

</div>
<script src ="code.js"></script>
<script src="app.js"></script>
</body>
</html>
